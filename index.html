<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>learning code homepage</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}
body{
    background:#0f172a;
    color:white;
}
nav{
    display:flex;
    align-items:center;
    padding:2% 8%;
    
}
.login{
    font-size:16px;
    font-weight:bold;
    
}
.hw{
    font-size:16px;
    font-weight:bold;
   
}
nav ul{
    display:flex;
    list-style:none;
    gap:25px;
}
nav a{
    text-decoration:none;
    color:white;
    transition:.3s;
}
nav a:hover{
    color:#38bdf8;
}
.happy{
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    background:
    linear-gradient(
    rgba(0,0,0,.6),
    rgba(0,0,0,.7)),
    url('coding.jpg');
    background-size:cover;
}
.mypage{
    font-size: 16px;
}

.user-menu{
    display:flex;
    align-items:center;
    gap:15px;

    margin-left:auto;
}
.dropdown{
    position:relative;
}

.submenu li{
    padding:12px;
}

.submenu li a{
    color:white;
    display:block;
}
.dropdown:hover .submenu{
    display:block;
    }
.submenu{
     display:none;
    position:absolute;

    top:100%;
    left:0;

    background:#1e293b;

    min-width:180px;

    list-style:none;

    border-radius:10px;

    box-shadow:0 5px 15px rgba(0,0,0,.4);

    overflow:hidden;

    z-index:1000;
}
.submenu li:hover{
    background:#38bdf8;
}
.submenu2 li{
    padding:12px;
}

.submenu2 li a{
    color:white;
    display:block;
}
.dropdown:hover .submenu2{
    display:block;
    }
.submenu2{
     display:none;
    position:absolute;

    top:100%;
    left:0;

    background:#1e293b;

    min-width:180px;

    list-style:none;

    border-radius:10px;

    box-shadow:0 5px 15px rgba(0,0,0,.4);

    overflow:hidden;

    z-index:1000;
}
.submenu2 li:hover{
    background:#38bdf8;
}
@media (max-width:768px){

    nav{
        flex-direction:column;
        gap:15px;
    }

    nav ul{
        flex-wrap:wrap;
        justify-content:center;
    }

    .user-menu{
        margin-left:0;
    }

    .happy h1{
        font-size:28px;
    }

    .happy p{
        font-size:16px;
    }

}
</style>

</head>
