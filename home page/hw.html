<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>회원가입</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}
body{
    background:#0f172a;
    color:white;

    display:flex;
    justify-content:center;
    align-items:center;

    min-height:100vh;
}
.hello{
    width:450px;
    padding:30px;

    background:#1e293b;
    border-radius:15px;

    text-align:center;
}
</style>
</head>
<body>
<div class="hello">
<h2>회원가입을 하세요.</h2>

<p>아래 빈칸에 자신의 정보를 쓰세요!</p>

<form>

  <label for="id">아이디:</label><br>
  <input type="text" id="id"><br><br>

  <label for="pw">비밀번호:</label><br>
  <input type="password" id="pw"><br><br>

  <label for="pwcheck">비밀번호 확인:</label><br>
  <input type="password" id="pwcheck" onkeyup="checkPassword()"><br><br>

<div id="result"></div><br>

  <label for="id">이메일 주소:</label><br>
  <input type="text" id="e-mail"><br><br>

  <label for="id">전화번호:</label><br>
  <input type="text" id="num"><br><br>

  <label for="id">생년월일:</label><br>
  <input type="text" id="years"><br><br>

  <label for="id">주민등록 번호:</label><br>
  <input type="text" id="nei"><br><br>


<input type="submit" value="완료">

</form>
</div>


<script>
function checkPassword() {

    let pw = document.getElementById("pw").value;
    let pwcheck = document.getElementById("pwcheck").value;
    let result = document.getElementById("result");

    if (pw === "" || pwcheck === "") {
        result.textContent = "";
    }
    else if (pw === pwcheck) {
        result.textContent = "비밀번호가 확인되었습니다.";
        result.style.color = "green";
    }
    else {
        result.textContent = "비밀번호가 다릅니다.";
        result.style.color = "red";
    }
}
</script>

</body>
</html>
